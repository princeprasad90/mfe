<section class="details" *ngIf="product; else notFound">
  <h2>{{ product.name }}</h2>
  <p><strong>ID:</strong> {{ product.id }}</p>
  <p>{{ product.description }}</p>
  <button type="button" (click)="backToList()">Back to list</button>
</section>

<ng-template #notFound>
  <p>Product not found</p>
</ng-template>
